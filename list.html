<!DOCTYPE html>
<html>

<head>

</head>
<body>
<h1>List tag</h1>
<ul>

    <li>CSS</li>        
    <li>JavaScript</li>
</ul>
<ol>

    <li>HTML</li>

</ol>

    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
    <dt>JavaScript</dt>
    <dd>Programming language for web development</dd>
    </dl>

</html>
