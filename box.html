<!DOCTYPE html>
<html>
<head>
    <title>My Animal Fact File</title>
    <style>
        body {
            background-color: darkgreen; 
            font-family: Arial, sans-serif;

        }
        .fact-file {
            background-color: lightyellow;
           color: darkslategray;
           width: 1200px;
           height: 1200px;
              padding: 40px;
        }
        .animel-name {
            color:forestgreen;
            font-size: 22px;
        }
        .cool fact {
            color: darkorange;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="fact-file">
        <h2 class="animel-name">Snow leopard</h2>
        <p class="detail">type: Big cat</p>
        <p class="detail">Lives in: Mountain ranges of Central Asia</p>
        <p class="detail">Diet: Deer, goats, and wild sheep</p>
        <p class="cool fact">Snow leopards can leap up to 15 meters in one jump!</p>

    </div>

</body>
</html>
