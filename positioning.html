<!DOCTYPE html>
<html lang="en">
<head>
 <title>My Pet Page </title> 
 <style>
    body {
            background-color: rgb(223, 230, 173);
        font-family: Arial, sans-serif;
        padding: 65px 30px 30px 30px;
        min-height: 1800px;
  
    }
h1, h2 {
    color:darkorange;
    }
    .top-bar {
       position: fixed;
         top: 0;
            left: 0;
            right: 0;
            background-color: darkorange;
            color: white;
            padding: 10px 20px;

}

.list-item {
    background-color: white;
    border: 2px solid darkorange;
padding: 10px 20px;
margin: 5px 0;

}

.special-note {
    position: relative;
    left: 30px;
    background-color: gold;
    padding: 10px 20px;

}

.badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background-color: forestgreen;
    color: white;
    padding: 4px 8px;


}

.section-label {
    position: sticky;
    top: 55px;
    background-color: darkorange;
    color: white;
    padding: 10px 20px;
    margin: 15px 0 8px;


}
</style>
</head>
<body>
    <div class="top-bar">
        <h1>My Pet Page</h1>
    </div>

    <h2>My Pets</h2>
    <div class="list-item">Fluffy the Cat</div>
    <div class="list-item">Buddy the Dog</div>
    <div class="list-item">Goldie the Fish</div>

    <div class="special-note">
        Note: Fluffy is a very shy cat and loves to hide under the bed!
        <span class="badge">Shy!</span>
    </div>

    <div class="section-label">Pet Care Tips</div>
    <p>Remember to feed your pets on time and give them lots of love!</p>
    
    


         
        
        
        
        
    
 </style>  <>
</head>
<body>

</body>
</html>
